<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yeni Kullanıcı Kaydı</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-indigo-400">Yeni Kullanıcı</h2>
            <p class="text-slate-400 text-sm mt-2">Sisteme yeni bir kullanıcı profili ekleyin.</p>
        </div>

        <!-- Form UserController'daki /users/save endpoint'ine post edilecek -->
        <form th:action="@{/users/save}" th:object="${user}" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Kullanıcı Adı</label>
                <input type="text" th:field="*{username}" required placeholder="örn. cenkbelit"
                       class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-400">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">E-posta Adresi</label>
                <input type="email" th:field="*{email}" required placeholder="örn. cenk@mail.com"
                       class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-400">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">Geçici Şifre</label>
                <input type="password" th:field="*{password}" required placeholder="••••••••"
                       class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-400">
            </div>

            <div class="flex items-center justify-between pt-4">
                <a th:href="@{/users}" class="text-sm text-slate-400 hover:text-white transition-colors">
                    ← Listeye Dön
                </a>
                <button type="submit" 
                        class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 transition-colors rounded-lg font-semibold shadow-lg text-white">
                    Kaydet
                </button>
            </div>
        </form>
    </div>

</body>
</html>
